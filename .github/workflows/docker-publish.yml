name: Release Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: adcrinis/finance-tracker

jobs:
  release:
    name: Version, build, and push
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag '${GITHUB_REF_NAME}' is not a semantic version tag like v1.2.3."
              exit 1
            fi

            version="${GITHUB_REF_NAME#v}"
            IFS='.' read -r major minor patch <<< "${version}"

            {
              echo "should_release=true"
              echo "tag=${GITHUB_REF_NAME}"
              echo "version=${version}"
              echo "major_minor=${major}.${minor}"
              echo "major=${major}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_tag="$(git tag --list 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
            git log --format=%B > /tmp/commit-messages.txt
          else
            git log --format=%B "${latest_tag}..HEAD" > /tmp/commit-messages.txt
          fi

          bump=""
          if grep -Eq '(^[[:alpha:]][[:alnum:]_-]*(\([^)]+\))?!:|^BREAKING[ -]CHANGE:)' /tmp/commit-messages.txt; then
            bump="major"
          elif grep -Eq '^feat(\([^)]+\))?:' /tmp/commit-messages.txt; then
            bump="minor"
          elif grep -Eq '^(fix|perf)(\([^)]+\))?:' /tmp/commit-messages.txt; then
            bump="patch"
          fi

          if [[ -z "${bump}" ]]; then
            echo "No release-worthy Conventional Commit found since ${latest_tag}."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          if git rev-parse "${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${new_tag}" -m "Release ${new_tag}"
          git push origin "${new_tag}"

          {
            echo "should_release=true"
            echo "tag=${new_tag}"
            echo "version=${new_version}"
            echo "major_minor=${major}.${minor}"
            echo "major=${major}"
          } >> "${GITHUB_OUTPUT}"

      # - name: Run tests
      #   if: steps.version.outputs.should_release == 'true'
      #   run: docker compose run --rm --build web pytest

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.version.outputs.should_release == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.version.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
